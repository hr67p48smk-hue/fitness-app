<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>План восстановления 🦊</title>

  <!-- Иконка на домашний экран. iOS сам ищет apple-touch-icon.png в корне; дублируем явно. -->
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="shortcut icon" href="./icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Лиса">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F7F2E8">

  <link rel="manifest" href="./manifest.json">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F7F2E8; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #C4B89E; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Защита: если React не загрузился (например, из-за старого сломанного кэша SW),
       очищаем кэш и SW и перезагружаемся один раз — самовосстановление. -->
  <script>
    (function () {
      if (window.React && window.ReactDOM) return; // всё хорошо
      try {
        if (sessionStorage.getItem("foxHealAttempt")) return; // уже пробовали — не зациклимся
        sessionStorage.setItem("foxHealAttempt", "1");
      } catch (e) {}
      (async function () {
        try {
          if (window.caches) { var ks = await caches.keys(); await Promise.all(ks.map(function (k) { return caches.delete(k); })); }
          if (navigator.serviceWorker) { var rs = await navigator.serviceWorker.getRegistrations(); await Promise.all(rs.map(function (r) { return r.unregister(); })); }
        } catch (e) {}
        location.reload();
      })();
    })();
  </script>
  <script src="./app.js"></script>
  <!-- Офлайн-режим: регистрируем service worker -->
  <script>
    // Сбрасываем флаг самовосстановления, если приложение успешно поднялось
    try { if (window.React && window.ReactDOM) sessionStorage.removeItem("foxHealAttempt"); } catch (e) {}
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
