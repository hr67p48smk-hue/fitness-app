function AIAssistant({ exName, muscle, steps, feel }) {
  const [open, setOpen] = useState(false);
  const [answer, setAnswer] = useState(null);

  const QUICK = [
    { q: "Какой вес выбрать?", key: "weight" },
    { q: "Где должна чувствовать?", key: "feel" },
    { q: "Боль в спине — что делать?", key: "back" },
    { q: "Как дышать?", key: "breath" },
    { q: "Сколько отдыхать между подходами?", key: "rest" },
    { q: "Сколько подходов и повторений?", key: "sets" },
    { q: "Когда увеличивать вес?", key: "progress" },
    { q: "Болят мышцы — норма?", key: "soreness" },
  ];

  return (
    <div style={{ marginTop: 10 }}>
      <button onClick={() => { setOpen(!open); setAnswer(null); }} style={{
        width:"100%", padding:"9px 12px", borderRadius:9,
        background: open ? C.oliveSoft : C.bgWarm,
        border:`1.5px solid ${open ? C.olive : C.border}`,
        cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center",
        fontFamily:"inherit",
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <div style={{ width:24, height:24, borderRadius:7, background:C.olive, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>💬</div>
          <div style={{ fontSize:12, fontWeight:700, color:C.oliveDeep }}>Вопросы по упражнению</div>
        </div>
        <div style={{ fontSize:11, color:C.textL }}>{open ? "▲" : "▼"}</div>
      </button>

      {open && (
        <div style={{ marginTop:6, background:C.card, borderRadius:10, border:`1.5px solid ${C.olive}33`, overflow:"hidden" }}>
          <div style={{ padding:"10px 12px", borderBottom:`1px solid ${C.border}` }}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {QUICK.map((item, i) => (
                <button key={i} onClick={() => setAnswer(item)} style={{
                  padding:"5px 9px", borderRadius:7,
                  border:`1px solid ${answer?.key === item.key ? C.olive : C.border}`,
                  background: answer?.key === item.key ? C.oliveSoft : C.bg,
                  cursor:"pointer", fontSize:11,
                  color: answer?.key === item.key ? C.oliveDeep : C.textM,
                  fontFamily:"inherit",
                }}>{item.q}</button>
              ))}
            </div>
          </div>
          {answer && (
            <div style={{ padding:"12px 14px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.olive, marginBottom:5 }}>{answer.q}</div>
              <div style={{ fontSize:13, color:C.text, lineHeight:1.65 }}>{EX_QA[answer.key]}</div>

// ── LOCAL STORAGE HOOK ────────────────────────────────────────────────────────
function useLS(key, def) {
  const [v, sv] = useState(() => { try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : def; } catch { return def; } });
  const set = useCallback(val => { sv(val); try { localStorage.setItem(key, JSON.stringify(typeof val === "function" ? val(v) : val)); } catch {} }, [key]);
  return [v, set];
}

// ── TIMER HOOK ────────────────────────────────────────────────────────────────
function useCountdown(secs) {
  const [left, setLeft] = useState(secs);
  const [on, setOn] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (on && left > 0) ref.current = setTimeout(() => setLeft(l => l - 1), 1000);
    else if (left === 0) setOn(false);
    return () => clearTimeout(ref.current);
  }, [on, left]);
  return { left, on, toggle: () => { if (left === 0) { setLeft(secs); setOn(false); } else setOn(o => !o); }, reset: () => { setLeft(secs); setOn(false); } };
}

// ── RING ──────────────────────────────────────────────────────────────────────
function Ring({ pct, size = 44, stroke = 4, color = C.olive }) {
  const r = (size - stroke) / 2, circ = 2 * Math.PI * r, off = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset .5s ease" }} />
    </svg>
  );
}

// ── SET TRACKER ───────────────────────────────────────────────────────────────
function SetTracker({ exId, dayId, clr }) {
  const [sets, setSets] = useLS(`s_${dayId}_${exId}`, []);
  const [hist, setHist] = useLS(`h_${dayId}_${exId}`, []);
  const [reps, setReps] = useState("");
  const [kg, setKg] = useState("");
  const [showH, setShowH] = useState(false);
  const { left, on, toggle, reset } = useCountdown(75);

  const addSet = () => {
    const r = parseInt(reps); if (!r) return;
    setSets([...sets, { r, kg: parseFloat(kg) || 0 }]);
    setReps(""); reset(); setTimeout(toggle, 80);
  };
  const saveSession = () => {
    if (!sets.length) return;
    setHist(h => [...h.slice(-29), { date: new Date().toLocaleDateString("ru-RU"), sets }]);
    setSets([]);
  };

  const m = Math.floor(left / 60), s = (left % 60).toString().padStart(2, "0");
  const pct = ((75 - left) / 75) * 100;

  // Progress chart (last 5 sessions, max weight used)
  const chartData = hist.slice(-5).map(h => ({ date: h.date, maxKg: Math.max(...h.sets.map(s => s.kg || 0)) }));

  return (
    <div style={{ marginTop: 10 }}>
      {sets.length > 0 && (
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 7 }}>
          {sets.map((s, i) => (
            <div key={i} style={{ background: clr + "18", border: `1px solid ${clr}44`, borderRadius: 7, padding: "3px 8px", display: "flex", gap: 4, alignItems: "center" }}>
              <span style={{ fontSize: 10, color: C.textL }}>#{i+1}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{s.r}×</span>
              {s.kg > 0 && <span style={{ fontSize: 10, color: C.textM }}>{s.kg}кг</span>}
              <button onClick={() => setSets(sets.filter((_, j) => j !== i))} style={{ background: "none", border: "none", cursor: "pointer", color: C.textL, fontSize: 10, padding: 0 }}>✕</button>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", gap: 5 }}>
        <input type="number" placeholder="Повт." value={reps} onChange={e => setReps(e.target.value)}
          style={{ flex: 1, padding: "8px 9px", borderRadius: 8, border: `1.5px solid ${C.border}`, background: C.bg, fontSize: 14, fontFamily: "inherit", color: C.text, outline: "none", boxSizing: "border-box", minWidth: 0 }} />
        <input type="number" placeholder="Кг" value={kg} onChange={e => setKg(e.target.value)}
          style={{ flex: 1, padding: "8px 9px", borderRadius: 8, border: `1.5px solid ${C.border}`, background: C.bg, fontSize: 14, fontFamily: "inherit", color: C.text, outline: "none", boxSizing: "border-box", minWidth: 0 }} />
        <button onClick={addSet} style={{ padding: "8px 12px", borderRadius: 8, background: clr, border: "none", color: C.white, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", flexShrink: 0 }}>
          + Подход
        </button>
      </div>

      {sets.length > 0 && (
        <div style={{ marginTop: 6, padding: "8px 10px", background: C.bgWarm, borderRadius: 8, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ position: "relative", flexShrink: 0 }}>
            <Ring pct={pct} size={38} stroke={3} color={on ? clr : C.textL} />
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: C.text }}>
              {left === 0 ? "✓" : `${m}:${s}`}
            </div>
          </div>
          <div style={{ flex: 1, fontSize: 11, color: left < 15 && on ? C.warn : C.textM }}>
            {left === 0 ? "Время следующего подхода!" : on ? "Отдых..." : "Таймер отдыха"}
          </div>
          <button onClick={toggle} style={{ padding: "5px 9px", borderRadius: 6, background: "none", border: `1px solid ${C.border}`, cursor: "pointer", fontSize: 11, color: C.textM, fontFamily: "inherit" }}>
            {left === 0 ? "↺" : on ? "⏸" : "▶"}
          </button>
        </div>
      )}

      <div style={{ display: "flex", gap: 5, marginTop: 5 }}>
        {sets.length > 0 && (
          <button onClick={saveSession} style={{ flex: 1, padding: "6px", borderRadius: 7, background: C.oliveSoft, border: `1px solid ${C.olive}44`, color: C.oliveDeep, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            Сохранить ✓
          </button>
        )}
        {hist.length > 0 && (
          <button onClick={() => setShowH(!showH)} style={{ flex: 1, padding: "6px", borderRadius: 7, background: C.sageSoft, border: `1px solid ${C.sage}44`, color: C.sage, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            📈 История ({hist.length})
          </button>
        )}
      </div>

      {showH && (
        <div style={{ marginTop: 6, background: C.card, borderRadius: 8, border: `1px solid ${C.border}`, padding: 10 }}>
          {chartData.length > 1 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.textL, marginBottom: 4 }}>Макс. вес — последние сессии</div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 40 }}>
                {chartData.map((d, i) => {
                  const maxV = Math.max(...chartData.map(x => x.maxKg), 1);
                  const h = d.maxKg > 0 ? Math.max(6, (d.maxKg / maxV) * 36) : 4;
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                      <div style={{ fontSize: 8, color: C.olive, fontWeight: 700 }}>{d.maxKg > 0 ? d.maxKg : ""}</div>
                      <div style={{ width: "100%", height: h, background: i === chartData.length - 1 ? C.olive : C.oliveSoft, borderRadius: 3 }} />
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{ maxHeight: 120, overflowY: "auto" }}>
            {hist.slice().reverse().map((h, i) => (
              <div key={i} style={{ marginBottom: 6, paddingBottom: 6, borderBottom: i < hist.length - 1 ? `1px solid ${C.border}` : "none" }}>
                <div style={{ fontSize: 9, color: C.textL, marginBottom: 2 }}>{h.date}</div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {h.sets.map((s, j) => <span key={j} style={{ fontSize: 10, color: C.text, background: C.bgWarm, borderRadius: 4, padding: "1px 5px" }}>{s.r}× {s.kg > 0 ? `${s.kg}кг` : ""}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function PreWorkoutCheck({ onDone }) {
  const checks = [
    { id: "ate", label: "Поела 1–1.5 часа назад (не голодная, не переполненная)" },
    { id: "water", label: "Выпила 300–400 мл воды до тренировки" },

    { id: "warm", label: "Знаю, что начну с разминки" },
  ];
  const [checked, setChecked] = useState({});
  const toggle = id => setChecked(p => ({ ...p, [id]: !p[id] }));
  const allDone = checks.every(c => checked[c.id]);

  return (
    <div style={{ background: C.card, borderRadius: 14, padding: "16px", marginBottom: 14, boxShadow: C.shadowM, border: `1.5px solid ${C.olive}44` }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 12 }}>✅ Готова к тренировке?</div>
      {checks.map(c => (

}

// ── WATER TRACKER ─────────────────────────────────────────────────────────────
function WaterTracker() {
  const todayKey = `water_${new Date().toDateString()}`;
  const [glasses, setGlasses] = useLS(todayKey, 0);
  const goal = 8;
  const pct = Math.min(100, Math.round((glasses / goal) * 100));

  return (
    <div style={{ background: C.card, borderRadius: 12, padding: "12px 14px", marginBottom: 12, boxShadow: C.shadow, border: `1px solid ${C.border}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>💧 Вода сегодня</div>
        <div style={{ fontSize: 12, color: C.textM }}>{glasses}/{goal} стаканов</div>
      </div>
      <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
        {Array.from({ length: goal }, (_, i) => (
          <div key={i} onClick={() => setGlasses(i < glasses ? i : i + 1)} style={{ flex: 1, height: 22, borderRadius: 4, background: i < glasses ? C.olive : C.bgWarm, border: `1px solid ${i < glasses ? C.olive : C.border}`, cursor: "pointer", transition: "all .15s" }} />
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 10, color: C.textL }}>{pct === 100 ? "Цель достигнута! 🎉" : `Осталось ${goal - glasses} стакана (≈${(goal - glasses) * 250}мл)`}</div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setGlasses(Math.max(0, glasses - 1))} style={{ width: 24, height: 24, borderRadius: 6, border: `1px solid ${C.border}`, background: "none", cursor: "pointer", fontSize: 12, color: C.textM }}>−</button>
          <button onClick={() => setGlasses(Math.min(goal, glasses + 1))} style={{ width: 24, height: 24, borderRadius: 6, border: "none", background: C.olive, cursor: "pointer", fontSize: 12, color: C.white, fontWeight: 700 }}>+</button>
        </div>
      </div>
    </div>
  );
}

// Which weekdays are workout days (0=Mon...6=Sun)
function DayPickerModal({ workoutDays, onChange, onClose }) {
  const [sel, setSel] = useState(workoutDays);
  const DAY_NAMES = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];
  const toggle = d => {
    if (sel.includes(d)) { if (sel.length > 1) setSel(sel.filter(x => x !== d)); }
    else if (sel.length < 3) setSel([...sel, d].sort());
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(42,36,24,.5)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div style={{ background: C.card, borderRadius: "16px 16px 0 0", padding: "20px 18px 36px", width: "100%", maxWidth: 430, boxSizing: "border-box" }}>

        <div style={{ fontSize: 12, color: C.textM, marginBottom: 16 }}>Выбери до 3 дней в неделю. Программа адаптируется.</div>
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 18 }}>
          {DAY_NAMES.map((name, i) => {
            const isSel = sel.includes(i);
            return (
              <button key={i} onClick={() => toggle(i)} style={{ flex: "0 0 calc(25% - 6px)", padding: "12px 4px", borderRadius: 10, border: `2px solid ${isSel ? C.olive : C.border}`, background: isSel ? C.oliveSoft : C.bg, cursor: "pointer", fontSize: 13, fontWeight: isSel ? 700 : 500, color: isSel ? C.oliveDeep : C.textM, fontFamily: "inherit", transition: "all .15s" }}>
                {name}
              </button>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 8 }}>

        </div>
      </div>
    </div>
  );
}

  };

          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text}}>Дневник питания</div>
            <button onClick={()=>setLog([])} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:C.textL,fontFamily:"inherit"}}>Очистить</button>
          </div>
          {log.map((item,i)=>(

              <div style={{fontSize:11,color:C.olive,fontWeight:700}}>{item.k} ккал</div>
            </div>
          ))}
          <div style={{marginTop:8,padding:"9px",background:C.bgWarm,borderRadius:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>Итого: {tot.k} ккал</div>
              <div style={{fontSize:11,color:tot.k>goalKcal?C.warn:C.olive}}>{tot.k>goalKcal?`+${tot.k-Number(goalKcal)} сверх`:`${Number(goalKcal)-tot.k} осталось`}</div>
            </div>
            <div style={{display:"flex",gap:6}}>
              {[{l:"Б",v:Math.round(tot.p),c:C.olive},{l:"Ж",v:Math.round(tot.f),c:C.sand},{l:"У",v:Math.round(tot.c),c:C.bark}].map(it=>(
                <div key={it.l} style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:it.c}}>{it.v}г</div>
                  <div style={{fontSize:9,color:C.textL}}>{it.l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CYCLE TAB ─────────────────────────────────────────────────────────────────
function CycleTab() {
  const [day, setDay] = useLS("cyDay", 1);
  const [taken, setTaken] = useLS("cyTaken", false);
  const [pillTime, setPillTime] = useLS("cyTime", "20:00");
  const [lastDate, setLastDate] = useLS("cyDate", "");
  const today = new Date().toDateString();
  useEffect(() => { if (lastDate !== today) { setTaken(false); setLastDate(today); } }, []);

  const d = Number(day);
  const phase = d <= 5 ? { name: "Менструация", clr: C.warn, note: "Снижай интенсивность. Расслабление тазового дна особенно важно. Лёгкая ходьба вместо кардио." }
    : d <= 13 ? { name: "Фолликулярная", clr: C.olive, note: "Лучшее время! Энергия высокая, восстановление быстрое. Хорошее время повышать веса." }
    : d <= 15 ? { name: "Овуляция", clr: C.sand, note: "Пик силы и энергии. Хорошее время для рекордов. Осторожно со связками — риск травм выше." }
    : { name: "Лютеиновая", clr: C.bark, note: "Энергия может снижаться. Снижай интенсивность на 10–15% при усталости. Больше белка и магния. Это нормально при КОК." };

  return (
    <div>
      <div style={{ background: C.card, borderRadius: 12, padding: "13px 14px", marginBottom: 10, boxShadow: C.shadow, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 10 }}>Трекер цикла и КОК</div>
        <div style={{ padding: "10px 12px", background: taken ? C.oliveSoft : C.warnSoft, borderRadius: 10, marginBottom: 10, border: `1.5px solid ${taken ? C.olive : C.warn}44`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: taken ? C.oliveDeep : C.warn }}>{taken ? "✓ КОК принята сегодня" : "💊 КОК — не отмечена"}</div>
            <div style={{ fontSize: 10, color: C.textM }}>Время приёма: {pillTime}</div>
          </div>
          <button onClick={() => setTaken(!taken)} style={{ padding: "7px 12px", borderRadius: 8, background: taken ? C.olive : C.warn, border: "none", color: C.white, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            {taken ? "Отмена" : "Отметить ✓"}
          </button>
        </div>
        <div style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>День цикла: {d}</div>
            <div style={{ fontSize: 11, color: phase.clr, fontWeight: 700 }}>{phase.name}</div>
          </div>
          <input type="range" min="1" max="28" value={d} onChange={e => setDay(Number(e.target.value))} style={{ width: "100%", accentColor: phase.clr }} />
        </div>
        <div style={{ padding: "9px 11px", background: phase.clr + "18", borderRadius: 9, border: `1px solid ${phase.clr}33`, marginBottom: 10 }}>
          <div style={{ fontSize: 12, color: C.text, lineHeight: 1.6 }}>{phase.note}</div>
        </div>
        <div style={{ display: "flex", gap: 2, flexWrap: "wrap", marginBottom: 6 }}>
          {Array.from({ length: 28 }, (_, i) => {
            const dd = i + 1, isNow = dd === d;
            const bg = dd <= 5 ? C.warn : dd <= 13 ? C.olive : dd <= 15 ? C.sand : C.bark;
            return <div key={dd} onClick={() => setDay(dd)} style={{ width: "calc(100%/14 - 2px)", aspectRatio: "1", borderRadius: 3, background: isNow ? C.text : bg + "66", cursor: "pointer", border: isNow ? `2px solid ${C.text}` : "none", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {isNow && <div style={{ width: 4, height: 4, borderRadius: "50%", background: C.white }} />}
            </div>;
          })}
        </div>
        <input type="time" value={pillTime} onChange={e => setPillTime(e.target.value)} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1.5px solid ${C.border}`, background: C.bg, fontSize: 14, fontFamily: "inherit", color: C.text, boxSizing: "border-box", outline: "none" }} />
        <div style={{ fontSize: 10, color: C.textL, marginTop: 5 }}>Принимай в одно время ±2 часа каждый день.</div>
      </div>
    </div>
  );
}

// ── STORAGE / EXPORT ─────────────────────────────────────────────────────────
function StorageInfo() {
  const [open, setOpen] = useState(false);
  const exportData = () => {
    try {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        data[k] = localStorage.getItem(k);
      }
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "fitness_backup.json"; a.click();
    } catch(e) { alert("Ошибка экспорта"); }
  };
  const importData = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.entries(data).forEach(([k,v]) => localStorage.setItem(k, v));
        alert("Данные восстановлены! Перезагрузи страницу.");
      } catch { alert("Ошибка импорта. Проверь файл."); }
    };
    r.readAsText(file);
  };
  return (
    <div style={{ background: C.card, borderRadius: 12, padding: "12px 14px", marginBottom: 10, boxShadow: C.shadow, border: `1px solid ${C.border}` }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: "inherit", padding: 0 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>💾 Хранение данных</div>
        <div style={{ fontSize: 10, color: C.textL }}>{open ? "▲" : "▼"}</div>
      </button>
      {open && (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 11, color: C.textM, lineHeight: 1.65, marginBottom: 10 }}>
            Все данные хранятся в памяти Safari на твоём iPhone (localStorage). Они <b style={{color:C.text}}>НЕ пропадут</b> при обычном использовании, но сбросятся если очистить данные Safari. Делай резервную копию раз в неделю.
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={exportData} style={{ flex: 1, padding: "9px", borderRadius: 9, background: C.oliveSoft, border: `1px solid ${C.olive}44`, color: C.oliveDeep, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              ⬇ Скачать копию
            </button>
            <label style={{ flex: 1, padding: "9px", borderRadius: 9, background: C.sandSoft, border: `1px solid ${C.sand}44`, color: C.sandDeep, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", textAlign: "center" }}>
              ⬆ Восстановить
              <input type="file" accept=".json" onChange={importData} style={{ display: "none" }}/>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

                  <div style={{ fontSize: 9, color: isToday ? C.olive : C.textL, fontWeight: isToday ? 800 : 400, marginBottom: 4, textTransform: "uppercase" }}>{d}</div>
                  <div onClick={() => isWD && markDay(i)} style={{ width: "100%", cursor: isWD ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", transition: "all .15s" }}>
                    <DayDot isWD={isWD} isToday={isToday} isDone={isDone} label={wdIdx >= 0 ? ["🍑","🦅","🔥"][wdIdx % 3] : ""} clr={C.olive} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Progress */}
        <div style={{ marginTop: 10, padding: "10px 12px", background: C.card, borderRadius: 11, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 10, boxShadow: C.shadow }}>
          <Ring pct={Math.round((doneCount / Math.max(1, workoutDays.length)) * 100)} size={40} stroke={4} color={C.olive} />
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{doneCount} из {workoutDays.length} тренировок на неделе</div>
            <div style={{ fontSize: 10, color: C.textM }}>{doneCount === workoutDays.length ? "Неделя выполнена! 🎉" : doneCount === 0 ? "Нажми на день чтобы отметить" : "Хороший прогресс!"}</div>
          </div>
        </div>
      </div>



      <div style={{ padding: "14px 14px 0" }}>
        {tab === "today" && (
          todayWorkout ? (
            <div>
              <div style={{ padding: "13px", borderRadius: 13, marginBottom: 13, background: `linear-gradient(135deg, ${todayWorkout.clrS}, ${C.card})`, border: `1.5px solid ${todayWorkout.clr}55`, boxShadow: C.shadow }}>
                <div style={{ fontSize: 9, color: todayWorkout.clrD, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>Сегодня · {DR[todayDow]}</div>
                <div style={{ fontSize: 19, fontWeight: 800, marginTop: 2, color: C.text }}>{todayWorkout.emoji} {todayWorkout.name}</div>
                <div style={{ display: "flex", gap: 6, marginTop: 5 }}>
                  <div style={{ background: todayWorkout.clr + "22", borderRadius: 5, padding: "2px 7px", fontSize: 10, color: todayWorkout.clrD, fontWeight: 600 }}>{todayWorkout.totalMin} мин</div>
                  <div style={{ background: todayWorkout.clr + "22", borderRadius: 5, padding: "2px 7px", fontSize: 10, color: todayWorkout.clrD, fontWeight: 600 }}>Нагрузка: {todayWorkout.intensity}</div>
                </div>
              </div>
              <WorkoutScreen day={todayWorkout} />
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "28px 10px" }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>○</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: C.text, marginBottom: 6 }}>День отдыха</div>
              <div style={{ fontSize: 12, color: C.textM, lineHeight: 1.7, marginBottom: 18 }}>
                Тренировочные дни: {workoutDays.map(d => DR[d]).join(", ")}<br />
                Сегодня: расслабление тазового дна, прогулка 20–30 мин
              </div>
              <WaterTracker />
              <button onClick={() => setTab("home")} style={{ width: "100%", padding: "11px", borderRadius: 10, background: C.oliveSoft, border: `1.5px solid ${C.olive}66`, color: C.oliveDeep, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                Упражнения для тазового дна →
              </button>
            </div>
          )
        )}
        {tab === "plan" && (
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {DAYS.map((d, i) => (
                <button key={i} onClick={() => setSelDay(i)} style={{ flex: 1, padding: "10px 4px", borderRadius: 10, border: `1.5px solid ${selDay === i ? d.clr : C.border}`, background: selDay === i ? d.clrS : C.card, cursor: "pointer", boxShadow: selDay === i ? C.shadow : "none" }}>
                  <div style={{ fontSize: 17 }}>{d.emoji}</div>
                  <div style={{ fontSize: 10, color: selDay === i ? d.clrD : C.textM, fontWeight: 700, marginTop: 3 }}>День {d.id}</div>
                  <div style={{ fontSize: 9, color: C.textL }}>{workoutDays.length > i ? DR[workoutDays[i]] : ""}</div>
                </button>
              ))}
            </div>
            <div style={{ padding: "11px 13px", borderRadius: 11, marginBottom: 11, background: `linear-gradient(135deg, ${DAYS[selDay].clrS}, ${C.card})`, border: `1.5px solid ${DAYS[selDay].clr}55`, boxShadow: C.shadow }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: C.text }}>{DAYS[selDay].emoji} {DAYS[selDay].name}</div>
              <div style={{ fontSize: 10, color: C.textM, marginTop: 2 }}>{DAYS[selDay].totalMin} мин · {DAYS[selDay].exercises.length} упражнений · Нагрузка: {DAYS[selDay].intensity}</div>
            </div>
            <WorkoutScreen day={DAYS[selDay]} />
          </div>
        )}
        {tab === "home" && <HomeTab />}
        {tab === "nutrition" && <NutritionTab />}
        {tab === "cycle" && <CycleTab />}
        {tab === "run" && <RunTab />}
        {tab === "settings" && <SettingsTab />}
      </div>

      {/* BOTTOM NAV */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: C.card + "f5", backdropFilter: "blur(16px)", borderTop: `1px solid ${C.border}`, display: "flex", padding: "8px 0 20px" }}>
        {tabs.map(t => {
          const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "2px 0" }}>
              <div style={{ fontSize: 18, lineHeight: 1, opacity: active ? 1 : 0.45, color: C.olive, filter: active ? "none" : "grayscale(1)" }}>
                {{"today":"🏠","plan":"📋","home":"🏡","nutrition":"🥗","cycle":"🌿","run":"🏃","settings":"⚙️"}[t.id]}
              </div>
              <div style={{ fontSize: 9, fontFamily: "inherit", color: active ? C.oliveDeep : C.textL, fontWeight: active ? 700 : 500 }}>{t.l}</div>
              {active && <div style={{ width: 16, height: 2, borderRadius: 1, background: C.olive }}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
